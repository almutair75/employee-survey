async function loadAndRender(){
  const t=T[lang];
  document.getElementById('sheet').innerHTML=`<div class="loading">${t.loading}</div>`;
  try{
    const snap=await db.collection('survey_responses').orderBy('timestamp','desc').get();
    let data=snap.docs.map(d=>({id:d.id,...d.data()}));
    const from=document.getElementById('f-from').value;
    const to=document.getElementById('f-to').value;
    const dept=document.getElementById('f-dept').value;
    if(from) data=data.filter(r=>r.timestamp?.slice(0,10)>=from);
    if(to)   data=data.filter(r=>r.timestamp?.slice(0,10)<=to);
    if(dept) data=data.filter(r=>r.department===dept);

    // Populate dept filter
    const ds=document.getElementById('f-dept');
    const ex=Array.from(ds.options).map(o=>o.value);
    [...new Set(snap.docs.map(d=>d.data().department).filter(Boolean))].sort()
      .forEach(d=>{if(!ex.includes(d)){const o=document.createElement('option');o.value=d;o.textContent=d;ds.appendChild(o);}});
    ds.value=dept;

    if(!data.length){
      document.getElementById('sheet').innerHTML=`<div class="loading">${t.noData}</div>`;
      return;
    }
    render(data);
  }catch(e){
    console.error(e);
    document.getElementById('sheet').innerHTML=`<div class="loading">${t.err}</div>`;
  }
}

async function copyAsImage(){
  const btn=document.getElementById('btn-copy');
  const t=T[lang];
  btn.textContent='⏳';btn.disabled=true;
  try{
    const canvas=await html2canvas(document.getElementById('sheet'),
      {scale:2.5,useCORS:true,backgroundColor:'#ffffff',logging:false});
    canvas.toBlob(async blob=>{
      try{
        await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
        btn.textContent='✅';
      }catch{
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');a.href=url;
        a.download='meeting-summary.png';a.click();URL.revokeObjectURL(url);
        btn.textContent='⬇️';
      }
      setTimeout(()=>{btn.textContent=t.btnC;btn.disabled=false;},2500);
    },'image/png');
  }catch(e){console.error(e);btn.textContent='❌';btn.disabled=false;}
}
