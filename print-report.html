<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التقرير الشامل — استبيان Odoo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --primary: #1a56db;
      --accent: #0891b2;
      --success: #059669;
      --warning: #d97706;
      --danger: #dc2626;
      --purple: #7c3aed;
      --text: #111827;
      --muted: #6b7280;
      --light: #9ca3af;
      --border: #e5e7eb;
      --bg: #f3f4f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; color: var(--text); background: #e8eaf0; direction: rtl; font-size: 13px; }

    /* ══ SCREEN CONTROLS ══ */
    .screen-only { display: block; }

    .topbar {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 0.875rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .topbar-brand { display: flex; align-items: center; gap: 0.75rem; }
    .topbar-brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1rem;
    }
    .topbar-brand h1 { font-size: 0.95rem; font-weight: 700; }
    .topbar-brand p  { font-size: 0.72rem; color: var(--muted); }
    .topbar-actions  { display: flex; gap: 0.6rem; flex-wrap: wrap; }

    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 1rem; border-radius: 8px; border: 1.5px solid;
      font-family: 'Cairo', sans-serif; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; text-decoration: none;
    }
    .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
    .btn-primary:hover { background: #1342a8; }
    .btn-success { background: var(--success); color: white; border-color: var(--success); }
    .btn-success:hover { background: #047857; }
    .btn-outline { background: white; color: #374151; border-color: var(--border); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    .filterbar {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex; align-items: center; gap: 0.875rem; flex-wrap: wrap;
    }
    .filterbar label { font-size: 0.75rem; font-weight: 700; color: var(--muted); white-space: nowrap; }
    .filterbar select, .filterbar input {
      padding: 0.38rem 0.65rem; border: 1.5px solid var(--border);
      border-radius: 7px; font-family: 'Cairo', sans-serif; font-size: 0.78rem;
      color: var(--text); background: white; outline: none;
    }
    .filterbar select:focus, .filterbar input:focus { border-color: var(--primary); }
    .sel-badge {
      margin-right: auto; font-size: 0.78rem; font-weight: 700;
      color: var(--primary); background: #e8effe;
      padding: 0.25rem 0.75rem; border-radius: 99px;
    }

    /* Employee selector panel */
    .emp-selector {
      background: white; border-radius: 12px;
      padding: 1.1rem 1.5rem; margin-bottom: 1rem;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    .emp-selector-title {
      font-size: 0.75rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem;
    }
    .emp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 0.45rem;
    }
    .emp-check-label {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.45rem 0.75rem;
      border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer; font-size: 0.8rem; font-weight: 600;
      transition: all 0.15s; user-select: none;
    }
    .emp-check-label:hover { border-color: var(--primary); background: #f0f4ff; }
    .emp-check-label input { accent-color: var(--primary); width: 14px; height: 14px; }
    .emp-check-dept { color: var(--light); font-size: 0.72rem; font-weight: 400; margin-right: auto; }

    /* ══ DOCUMENT ══ */
    .doc-wrap { max-width: 860px; margin: 1.25rem auto; padding: 0 1rem 3rem; }

    /* Cover */
    .cover {
      background: white; border-radius: 14px; padding: 2.5rem 2.5rem 2rem;
      margin-bottom: 1rem; box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      text-align: center; border-top: 5px solid var(--primary);
      page-break-after: always;
    }
    .cover-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 16px; margin: 0 auto 1.25rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; color: white;
    }
    .cover h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.35rem; }
    .cover h2 { font-size: 0.95rem; font-weight: 500; color: var(--muted); margin-bottom: 1.75rem; }

    .cover-kpis {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 0.875rem; margin: 1.5rem 0;
    }
    .cover-kpi {
      background: var(--bg); border-radius: 10px; padding: 1rem;
      border: 1px solid var(--border);
    }
    .cover-kpi-num { font-size: 1.75rem; font-weight: 800; color: var(--primary); line-height: 1; }
    .cover-kpi-lbl { font-size: 0.72rem; color: var(--muted); margin-top: 0.25rem; }

    /* Usage bars on cover (replaces doughnut for print) */
    .usage-bars { margin-top: 1.25rem; text-align: right; }
    .usage-bars-title {
      font-size: 0.75rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem;
      text-align: right;
    }
    .usage-bar-row {
      display: flex; align-items: center; gap: 0.625rem;
      margin-bottom: 0.6rem;
    }
    .usage-bar-label { font-size: 0.78rem; font-weight: 600; min-width: 130px; text-align: right; }
    .usage-bar-track {
      flex: 1; height: 14px; background: #f0f0f0;
      border-radius: 99px; overflow: hidden;
      position: relative;
    }
    .usage-bar-fill {
      height: 100%; border-radius: 99px;
      transition: width 0.6s ease;
    }
    .usage-bar-count {
      font-size: 0.75rem; font-weight: 700; min-width: 52px; text-align: left;
      color: var(--muted);
    }

    .cover-meta {
      border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 1.25rem;
      font-size: 0.75rem; color: var(--muted); line-height: 1.8;
    }

    /* TOC */
    .toc {
      background: white; border-radius: 14px; padding: 1.5rem 2rem;
      margin-bottom: 1rem; box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      page-break-after: always;
    }
    .toc-heading {
      font-size: 0.85rem; font-weight: 800; color: var(--primary);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem;
      padding-bottom: 0.5rem; border-bottom: 2px solid var(--primary);
    }
    .toc-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.5rem 0; border-bottom: 1px dashed var(--border); font-size: 0.82rem;
    }
    .toc-idx {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--primary); color: white;
      font-size: 0.65rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .toc-name { flex: 1; font-weight: 700; }
    .toc-dept { color: var(--muted); font-size: 0.75rem; }
    .toc-score {
      font-size: 0.75rem; font-weight: 700;
      padding: 0.15rem 0.5rem; border-radius: 99px;
    }

    /* ══ EMPLOYEE CARD ══ */
    .emp-card {
      background: white; border-radius: 14px;
      margin-bottom: 1rem; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      page-break-inside: avoid; page-break-after: always;
    }
    .emp-card:last-child { page-break-after: avoid; }

    .emp-card-header {
      padding: 1.1rem 1.5rem;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: white; display: flex; align-items: center; gap: 0.875rem;
    }
    .emp-initials {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.22);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 800; flex-shrink: 0;
    }
    .emp-info h3 { font-size: 1rem; font-weight: 700; }
    .emp-info p  { font-size: 0.75rem; opacity: 0.85; margin-top: 0.1rem; }
    .emp-avg {
      margin-right: auto; text-align: center;
      background: rgba(255,255,255,0.18); border-radius: 10px;
      padding: 0.4rem 0.875rem;
    }
    .emp-avg-num { font-size: 1.6rem; font-weight: 800; line-height: 1; }
    .emp-avg-lbl { font-size: 0.62rem; opacity: 0.8; }

    .emp-card-body { padding: 1.25rem 1.5rem; }

    /* Meta strip */
    .emp-meta {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 0.625rem;
      margin-bottom: 1.1rem; padding-bottom: 0.875rem;
      border-bottom: 1px solid var(--border);
    }
    .meta-item {}
    .meta-lbl { font-size: 0.65rem; font-weight: 700; color: var(--light); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.18rem; }
    .meta-val { font-size: 0.82rem; font-weight: 600; }

    /* ══ PROGRESS BARS — RATING QUESTIONS ══ */
    .ratings-title {
      font-size: 0.72rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.875rem;
    }

    .prog-row {
      display: flex; align-items: center; gap: 0.625rem;
      margin-bottom: 0.625rem;
    }
    .prog-num {
      width: 18px; height: 18px; border-radius: 50%;
      background: #eef0f3; color: var(--primary);
      font-size: 0.6rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .prog-label {
      min-width: 170px; max-width: 170px;
      font-size: 0.78rem; font-weight: 600; color: var(--text);
      line-height: 1.3;
    }
    .prog-track {
      flex: 1; height: 12px; background: #eef0f3;
      border-radius: 99px; overflow: hidden; position: relative;
    }
    .prog-fill {
      height: 100%; border-radius: 99px;
      transition: width 0.5s ease;
    }
    .prog-pct {
      font-size: 0.75rem; font-weight: 800;
      min-width: 32px; text-align: left;
    }
    .prog-score-badge {
      font-size: 0.68rem; font-weight: 700;
      padding: 0.12rem 0.45rem; border-radius: 99px;
      min-width: 56px; text-align: center; white-space: nowrap;
    }
    .prog-note {
      margin-top: 0.18rem;
      font-size: 0.7rem; color: var(--muted);
      background: #f9fafb; padding: 0.28rem 0.5rem;
      border-radius: 5px; border-inline-start: 2px solid #d1d5db;
    }

    /* Divider between operational & strategic */
    .section-divider {
      display: flex; align-items: center; gap: 0.75rem;
      margin: 1rem 0 0.875rem;
    }
    .section-divider-line { flex: 1; height: 1px; background: var(--border); }
    .section-divider-lbl {
      font-size: 0.68rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      background: white; padding: 0 0.5rem;
    }

    /* Text responses */
    .text-section { margin-top: 1rem; padding-top: 0.875rem; border-top: 1px solid var(--border); }
    .text-title {
      font-size: 0.72rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.625rem;
    }
    .text-box {
      margin-bottom: 0.625rem; padding: 0.625rem 0.875rem;
      background: #f9fafb; border-radius: 8px;
      border-inline-start: 3px solid var(--primary);
    }
    .text-box-lbl { font-size: 0.65rem; font-weight: 700; color: var(--primary); margin-bottom: 0.25rem; }
    .text-box-val { font-size: 0.8rem; color: var(--text); line-height: 1.6; }

    /* Card footer */
    .emp-card-footer {
      padding: 0.5rem 1.5rem;
      background: var(--bg); border-top: 1px solid var(--border);
      display: flex; justify-content: space-between;
      font-size: 0.68rem; color: var(--light);
    }

    /* Empty / loading */
    .empty { text-align: center; padding: 3rem; color: var(--muted); background: white; border-radius: 12px; }
    .empty i { font-size: 2rem; display: block; margin-bottom: 0.75rem; opacity: 0.35; }

    /* ══ PRINT OVERRIDES ══ */
    @media print {
      body { background: white !important; font-size: 11px; }
      .screen-only, .topbar, .filterbar, .emp-selector { display: none !important; }
      .doc-wrap { margin: 0; padding: 0; max-width: 100%; }
      .cover, .toc { box-shadow: none; border-radius: 0; page-break-after: always; }
      .emp-card { box-shadow: none; border-radius: 0; margin-bottom: 0; border: none; border-bottom: 1px solid #ddd; }
      .emp-card-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .prog-fill, .usage-bar-fill { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .prog-track, .usage-bar-track { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar screen-only">
  <div class="topbar-brand">
    <div class="topbar-brand-icon"><i class="bi bi-file-earmark-bar-graph"></i></div>
    <div>
      <h1>التقرير الشامل — استبيان Odoo</h1>
      <p>اختر الموظفين ثم اطبع أو احفظ PDF</p>
    </div>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-outline" onclick="toggleAll()">
      <i class="bi bi-check-all"></i> <span id="lbl-toggle-all">تحديد الكل</span>
    </button>
    <button class="btn btn-success" onclick="window.print()">
      <i class="bi bi-printer-fill"></i> طباعة / PDF
    </button>
    <a href="dashboard.html" class="btn btn-outline">
      <i class="bi bi-arrow-right"></i> رجوع
    </a>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filterbar screen-only">
  <label id="lbl-f-dept">القسم:</label>
  <select id="f-dept" onchange="applyFilters()"><option value="">كل الأقسام</option></select>
  <label id="lbl-f-from">من:</label>
  <input type="date" id="f-from" onchange="applyFilters()" />
  <label id="lbl-f-to">إلى:</label>
  <input type="date" id="f-to" onchange="applyFilters()" />
  <label id="lbl-f-rating">أدنى تقييم:</label>
  <select id="f-rating" onchange="applyFilters()">
    <option value="">الكل</option>
    <option value="4">4+</option>
    <option value="3">3+</option>
    <option value="2">2+</option>
  </select>
  <div class="sel-badge" id="sel-badge">0 محدد</div>
</div>

<!-- DOCUMENT -->
<div class="doc-wrap">
  <div id="emp-selector-wrap"></div>
  <div id="doc">
    <div class="empty" style="background:white;border-radius:12px;">
      <i class="bi bi-hourglass-split" style="font-size:2rem;display:block;margin-bottom:0.75rem;opacity:0.4;"></i>
      <p id="loading-txt">جاري تحميل البيانات من قاعدة البيانات...</p>
    </div>
  </div>
</div>

<script>
/* ══ BILINGUAL LABELS ══ */
const LABELS = {

/* ══ META ══ */
const Q_TYPES = [
  'standard','standard','standard','standard','standard','standard',
  'problem','standard','knowledge','success','development','alternative'
];

const USAGE_COLORS = {
  daily:'#1a56db', weekly:'#0891b2', rarely:'#10b981', little:'#9ca3af'
};

/* ══ STATE ══ */
let all = [], filtered = [], selected = new Set();
let lang = 'ar';  // set from URL param
let L = LABELS.ar; // active labels

/* ══ BOOT ══ */
addEventListener('DOMContentLoaded', () => {
  // Read lang from URL
  const p = new URLSearchParams(location.search);
  lang = p.get('lang') === 'en' ? 'en' : 'ar';
  L = LABELS[lang];

  // Apply direction
  document.documentElement.setAttribute('dir', L.dir);
  document.documentElement.setAttribute('lang', lang);
  document.body.style.fontFamily = lang === 'ar' ? "'Cairo', sans-serif" : "'Inter', sans-serif";

  // Update static UI text
  document.getElementById('btn-print-txt').textContent = L.ui.printBtn;
  document.getElementById('btn-close-txt').textContent = L.ui.closeBtn;
  document.getElementById('lbl-toggle-all').textContent = L.ui.selectAll;
  document.getElementById('f-dept').options[0].textContent = L.ui.allDepts;
  document.getElementById('f-rating').options[0].textContent = L.ui.allRatings;
  document.getElementById('lbl-f-dept').textContent = L.ui.lblDept;
  document.getElementById('lbl-f-from').textContent = L.ui.lblFrom;
  document.getElementById('lbl-f-to').textContent = L.ui.lblTo;
  document.getElementById('lbl-f-rating').textContent = L.ui.lblRating;

  // Loading message in correct language
  const loadTxt = document.getElementById('loading-txt');
  if (loadTxt) loadTxt.textContent = lang === 'ar'
    ? 'جاري تحميل البيانات من قاعدة البيانات...'
    : 'Loading data from database...';

  // Load data from Firebase
  loadData().then(data => {
    all = data;

    // Populate dept filter
    const ds = document.getElementById('f-dept');
    [...new Set(all.map(r=>r.department).filter(Boolean))].sort().forEach(d => {
      const o = document.createElement('option');
      o.value = d; o.textContent = d; ds.appendChild(o);
    });

    if (p.get('dept'))     { ds.value = p.get('dept'); }
    if (p.get('dateFrom')) { document.getElementById('f-from').value = p.get('dateFrom'); }
    if (p.get('dateTo'))   { document.getElementById('f-to').value   = p.get('dateTo');   }

    applyFilters();
  });
});

async function loadData() {
  try {
    const { initializeApp, getApps } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const { getFirestore, collection, getDocs, query, orderBy } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const cfg = {
      apiKey: "AIzaSyAK2-UBMDtyvkPGRGXJLXIq311U4N32fVo",
      authDomain: "employee-survey-7a907.firebaseapp.com",
      projectId: "employee-survey-7a907",
      storageBucket: "employee-survey-7a907.firebasestorage.app",
      messagingSenderId: "936069019815",
      appId: "1:936069019815:web:b63cb3a565e57f3ec4c382"
    };
    const app = getApps().find(a=>a.name==='rpt') || initializeApp(cfg,'rpt');
    const db  = getFirestore(app);
    const q   = query(collection(db,'survey_responses'), orderBy('timestamp','desc'));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) {
    console.error('Firebase load error:', e);
    // Fallback to localStorage
    return JSON.parse(localStorage.getItem('odoo_survey_responses') || '[]');
  }
}

function applyFilters() {
  const dept   = document.getElementById('f-dept').value;
  const from   = document.getElementById('f-from').value;
  const to     = document.getElementById('f-to').value;
  const minR   = parseFloat(document.getElementById('f-rating').value) || 0;

  filtered = all.filter(r => {
    if (dept && r.department !== dept) return false;
    if (from && r.timestamp.slice(0,10) < from) return false;
    if (to   && r.timestamp.slice(0,10) > to)   return false;
    if (minR && (r.avgRating||0) < minR)         return false;
    return true;
  });

  selected = new Set(filtered.map(r => r.id));
  renderSelector();
  renderDoc();
  updateBadge();
}

function toggleAll() {
  if (selected.size === filtered.length) selected.clear();
  else selected = new Set(filtered.map(r => r.id));
  document.querySelectorAll('.emp-cb').forEach(cb => cb.checked = selected.has(cb.dataset.id));
  document.getElementById('lbl-toggle-all').textContent =
    selected.size === filtered.length
      ? (lang==='ar' ? 'إلغاء تحديد الكل' : 'Deselect All')
      : L.ui.selectAll;
  renderDoc(); updateBadge();
}

function toggleEmp(id, v) {
  v ? selected.add(id) : selected.delete(id);
  renderDoc(); updateBadge();
}

function updateBadge() {
  document.getElementById('sel-badge').textContent =
    L.ui.selBadge.replace('{n}', selected.size);
}

/* ══ EMPLOYEE SELECTOR ══ */
function renderSelector() {
  const wrap = document.getElementById('emp-selector-wrap');
  if (!filtered.length) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = `
    <div class="emp-selector screen-only">
      <div class="emp-selector-title"><i class="bi bi-people"></i> ${L.ui.selectEmps}</div>
      <div class="emp-grid">
        ${filtered.map(r => `
          <label class="emp-check-label">
            <input type="checkbox" class="emp-cb" data-id="${r.id}"
              ${selected.has(r.id)?'checked':''}
              onchange="toggleEmp('${r.id}',this.checked)" />
            ${esc(r.name)}
            <span class="emp-check-dept">${esc(r.department)}</span>
          </label>`).join('')}
      </div>
    </div>`;
}

/* ══ MAIN DOCUMENT ══ */
function renderDoc() {
  const data = filtered.filter(r => selected.has(r.id))
    .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
  const doc = document.getElementById('doc');

  if (!data.length) {
    doc.innerHTML = `<div class="empty"><i class="bi bi-person-x"></i><p>${L.ui.noSelected}</p></div>`;
    return;
  }

  const avgAll = data.reduce((a,r)=>a+(r.avgRating||0),0) / data.length;
  const depts  = new Set(data.map(r=>r.department));
  const date   = new Date().toLocaleDateString(L.locale,{day:'2-digit',month:'long',year:'numeric'});
  const from   = document.getElementById('f-from').value;
  const to     = document.getElementById('f-to').value;
  const period = from&&to
    ? `${from} — ${to}`
    : from ? `${L.ui.from} ${from}`
    : to   ? `${L.ui.until} ${to}`
    : L.ui.allPeriods;

  const uc = {daily:0,weekly:0,rarely:0,little:0};
  data.forEach(r => { if(r.usage&&uc[r.usage]!==undefined) uc[r.usage]++; });
  const total = data.length;

  doc.innerHTML =
    buildCover(data.length, avgAll, depts.size, date, period, uc, total) +
    buildTOC(data) +
    data.map((r,i) => buildEmpCard(r, i+1, data.length)).join('');
}

/* ── Cover ── */
function buildCover(count, avg, deptCount, date, period, uc, total) {
  const avgColor = avg>=4?'#059669':avg>=3?'#1a56db':avg>=2?'#d97706':'#dc2626';

  const usageBars = Object.entries(uc).map(([k,v]) => {
    const pct = total ? Math.round((v/total)*100) : 0;
    const w   = total ? (v/total*100).toFixed(1)  : 0;
    const empWord = lang==='ar' ? 'موظف' : 'emp.';
    return `<div class="usage-bar-row">
      <div class="usage-bar-label">${L.usage[k]}</div>
      <div class="usage-bar-track">
        <div class="usage-bar-fill" style="width:${w}%;background:${USAGE_COLORS[k]};"></div>
      </div>
      <div class="usage-bar-count">${v} ${empWord} &nbsp;${pct}%</div>
    </div>`;
  }).join('');

  return `<div class="cover">
    <div class="cover-icon"><i class="bi bi-bar-chart-line"></i></div>
    <h1>${L.ui.reportTitle}</h1>
    <h2>${L.ui.company}</h2>
    <div class="cover-kpis">
      <div class="cover-kpi">
        <div class="cover-kpi-num">${count}</div>
        <div class="cover-kpi-lbl">${L.ui.participated}</div>
      </div>
      <div class="cover-kpi">
        <div class="cover-kpi-num" style="color:${avgColor};">${avg.toFixed(2)}</div>
        <div class="cover-kpi-lbl">${L.ui.avgSat}</div>
      </div>
      <div class="cover-kpi">
        <div class="cover-kpi-num">${deptCount}</div>
        <div class="cover-kpi-lbl">${L.ui.deptPart}</div>
      </div>
    </div>
    <div class="usage-bars">
      <div class="usage-bars-title">${L.ui.usageDist}</div>
      ${usageBars}
    </div>
    <div class="cover-meta">
      <div>${L.ui.period}: ${period}</div>
      <div>${L.ui.printedOn}: ${date}</div>
      <div>Odoo Usage Evaluation Survey</div>
    </div>
  </div>`;
}

/* ── TOC ── */
function buildTOC(data) {
  const rows = data.map((r,i) => {
    const avg = r.avgRating || 0;
    const color = avg>=4?'#059669':avg>=3?'#1a56db':avg>=2?'#d97706':'#dc2626';
    const bg    = avg>=4?'#f0fdf4':avg>=3?'#e8effe':avg>=2?'#fffbeb':'#fef2f2';
    return `<div class="toc-row">
      <span class="toc-idx">${i+1}</span>
      <span class="toc-name">${esc(r.name)}</span>
      <span class="toc-dept">${esc(r.department)}</span>
      <span class="toc-score" style="color:${color};background:${bg};">${avg.toFixed(1)}/5</span>
    </div>`;
  }).join('');
  return `<div class="toc">
    <div class="toc-heading"><i class="bi bi-list-ol"></i> ${L.ui.index}</div>
    ${rows}
  </div>`;
}

/* ── Employee Card ── */
function buildEmpCard(r, idx, total) {
  const avg      = r.avgRating || 0;
  const avgColor = avg>=4?'#059669':avg>=3?'#1a56db':avg>=2?'#d97706':'#dc2626';
  const date     = new Date(r.timestamp).toLocaleDateString(L.locale,{day:'2-digit',month:'long',year:'numeric'});
  const initials = (r.name||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  const usageTxt = L.usage[r.usage] || r.usage || '—';

  const lblName = lang==='ar'?'الاسم':'Name';
  const lblDept = lang==='ar'?'القسم':'Department';
  const lblDate = lang==='ar'?'تاريخ الإرسال':'Submission Date';

  // Operational questions (q0–q7)
  const opRows = L.qLabels.slice(0,8).map((label,i) => {
    const qKey = 'q'+i;
    return progRow({key:qKey, type:Q_TYPES[i], label}, i, r);
  }).join('');

  // Strategic questions (q8–q11)
  const stRows = L.qLabels.slice(8).map((label,i) => {
    const qKey = 'q'+(i+8);
    return progRow({key:qKey, type:Q_TYPES[i+8], label}, i+8, r);
  }).join('');

  let textHtml = '';
  if (r.problems || r.suggestions) {
    const boxes = [];
    if (r.problems)    boxes.push({lbl:L.ui.problems,    val:r.problems,    color:'#dc2626'});
    if (r.suggestions) boxes.push({lbl:L.ui.suggestions, val:r.suggestions, color:'#1a56db'});
    textHtml = `<div class="text-section">
      <div class="text-title">${L.ui.comments}</div>
      ${boxes.map(b=>`<div class="text-box" style="border-inline-start-color:${b.color};">
        <div class="text-box-lbl" style="color:${b.color};">${b.lbl}</div>
        <div class="text-box-val">${esc(b.val)}</div>
      </div>`).join('')}
    </div>`;
  }

  return `<div class="emp-card">
    <div class="emp-card-header">
      <div class="emp-initials">${initials}</div>
      <div class="emp-info">
        <h3>${esc(r.name)}</h3>
        <p>${esc(r.department)} · ${usageTxt} · ${date}</p>
      </div>
      <div class="emp-avg">
        <div class="emp-avg-num">${avg.toFixed(1)}</div>
        <div class="emp-avg-lbl">/ 5</div>
      </div>
    </div>
    <div class="emp-card-body">
      <div class="emp-meta">
        <div class="meta-item"><div class="meta-lbl">${lblName}</div><div class="meta-val">${esc(r.name)}</div></div>
        <div class="meta-item"><div class="meta-lbl">${lblDept}</div><div class="meta-val">${esc(r.department)}</div></div>
        <div class="meta-item"><div class="meta-lbl">${lblDate}</div><div class="meta-val">${date}</div></div>
      </div>
      <div class="ratings-title">${L.ui.opRating}</div>
      ${opRows}
      <div class="section-divider">
        <div class="section-divider-line"></div>
        <div class="section-divider-lbl">${L.ui.futureDiv}</div>
        <div class="section-divider-line"></div>
      </div>
      ${stRows}
      ${textHtml}
    </div>
    <div class="emp-card-footer">
      <span>${L.ui.footer}</span>
      <span>${L.ui.empOf.replace('{i}',idx).replace('{total}',total)}</span>
    </div>
  </div>`;
}

/* ── Progress Row ── */
function progRow(q, globalIdx, r) {
  const val = r.ratings?.[q.key];
  if (!val) return '';
  const pct   = (val / 5) * 100;
  const scale = L.scale[q.type] || L.scale.standard;
  const lbl   = scale[val] || '';
  let color;
  if (q.key === 'q6') {
    color = val<=2?'#ef4444': val<=3?'#f97316': val<=4?'#eab308':'#10b981';
  } else if (q.key === 'q10' || q.key === 'q11') {
    color = val>=4?'#ef4444': val>=3?'#f97316': val>=2?'#eab308':'#10b981';
  } else {
    color = val>=4?'#10b981': val>=3?'#1a56db': val>=2?'#f97316':'#ef4444';
  }
  const noteKey = 'note_' + q.key;
  const noteVal = r.notes?.[noteKey];
  return `<div>
    <div class="prog-row">
      <div class="prog-num">${globalIdx+1}</div>
      <div class="prog-label">${q.label}</div>
      <div class="prog-track">
        <div class="prog-fill" style="width:${pct}%;background:${color};"></div>
      </div>
      <div class="prog-pct" style="color:${color};">${pct.toFixed(0)}%</div>
      <div class="prog-score-badge" style="color:${color};background:${color}18;">${val}/5 ${lbl}</div>
    </div>
    ${noteVal ? `<div style="padding-${lang==='ar'?'right':'left'}:26px;">
      <div class="prog-note">📝 ${esc(noteVal)}</div>
    </div>` : ''}
  </div>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
